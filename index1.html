<html>
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Наурызбаева Жанель">
    <meta name="description" content="Страница с базой данных рецептов">
    <title>Главная страница</title>
</head>

<body>
    <h1>Сайт с рецептами</h1>
    <p><b>Добро пожаловать на наш сайт с рецептами!</b></p>

    <p id="serverMessage"></p>

    <h2>Добавить продукт</h2>
    <input id="nameOfProduct" placeholder="Название продукта">
    <input id="translateOfProduct" placeholder="Перевод">
    <input id="alterNameOfProduct" placeholder="Категория">
    <button onclick="addProduct()">Добавить продукт</button>

    <h2>Добавить рецепт</h2>
    <input id="nameOfRecipe" placeholder="Название рецепта">
    <input id="translateOfRecipe" placeholder="Перевод рецепта">
    <input id="alterNameOfRecipe" placeholder="Категория рецепта">
    <input id="recipe" placeholder="Рецепт">
    <button onclick="addRecipe()">Добавить рецепт</button>

    <h2>Продукты</h2>
    <ul id="productList"></ul>

    <h2>Рецепты</h2>
    <ul id="recipeList"></ul>

    <script>
        const API_BASE = "http://localhost:8080/api";

        const productConfig = {
            listId: "productList",
            getUrl: `${API_BASE}/products`,
            postUrl: `${API_BASE}/product`,
            updateUrl: `${API_BASE}/product`,
            deleteUrl: `${API_BASE}/product`,
            getId: product => product.id,
            renderText: product => `${product.name} - ${product.translate} - ${product.alterName}`,
            refresh: () => getProducts()
        };

        const recipeConfig = {
            listId: "recipeList",
            getUrl: `${API_BASE}/recipes`,
            postUrl: `${API_BASE}/recipe`,
            updateUrl: `${API_BASE}/recipes`,
            deleteUrl: `${API_BASE}/recipes`,
            getId: recipe => recipe.idOfRecipe,
            renderText: recipe => `${recipe.name} - ${recipe.translate_of_recipe} - ${recipe.alter_name_of_recipe} - ${recipe.recipe}`,
            refresh: () => getRecipes()
        };

        function showMessage(message) {
            document.getElementById("serverMessage").textContent = message;
        }

        function clearMessage() {
            document.getElementById("serverMessage").textContent = "";
        }

        function requestJson(url) {
            return fetch(url, {
                method: "GET"
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Ошибка HTTP: ${response.status}`);
                    }

                    return response.json();
                });
        }

        function sendData(url, method, data) {
            return fetch(url, {
                method: method,
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Ошибка HTTP: ${response.status}`);
                    }

                    return response.text();
                });
        }

        function deleteData(url, id) {
            return fetch(`${url}/${id}`, {
                method: "DELETE"
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Ошибка HTTP: ${response.status}`);
                    }

                    return response.text();
                });
        }

        function updateData(url, id, data) {
            return sendData(`${url}/${id}`, "PUT", data);
        }

        function createButton(text, onClick) {
            const button = document.createElement("button");
            button.textContent = text;
            button.onclick = onClick;
            return button;
        }

        function renderList(config, items) {
            const list = document.getElementById(config.listId);
            list.innerHTML = "";

            items.forEach(item => {
                const listItem = document.createElement("li");

                const text = document.createElement("span");
                text.textContent = config.renderText(item) + " ";

                const updateButton = createButton("Изменить", function () {
                    updateItem(config, item);
                });

                const deleteButton = createButton("Удалить", function () {
                    deleteItem(config, item);
                });

                listItem.appendChild(text);
                listItem.appendChild(updateButton);
                listItem.appendChild(deleteButton);

                list.appendChild(listItem);
            });
        }

        function loadList(config) {
            requestJson(config.getUrl)
                .then(data => {
                    clearMessage();
                    renderList(config, data);
                })
                .catch(error => {
                    console.error("Ошибка при получении данных:", error);
                    showMessage("Сервер недоступен. Пожалуйста, попробуйте позже.");
                });
        }

        function getProducts() {
            loadList(productConfig);
        }

        function getRecipes() {
            loadList(recipeConfig);
        }

        function getProductFormData() {
            return {
                name: document.getElementById("nameOfProduct").value,
                translate: document.getElementById("translateOfProduct").value,
                alterName: document.getElementById("alterNameOfProduct").value
            };
        }

        function getRecipeFormData() {
            return {
                name: document.getElementById("nameOfRecipe").value,
                translate_of_recipe: document.getElementById("translateOfRecipe").value,
                alter_name_of_recipe: document.getElementById("alterNameOfRecipe").value,
                recipe: document.getElementById("recipe").value
            };
        }

        function addProduct() {
            const product = getProductFormData();

            sendData(productConfig.postUrl, "POST", product)
                .then(data => {
                    console.log(data);
                    clearMessage();
                    getProducts();
                })
                .catch(error => {
                    console.error("Ошибка при добавлении продукта:", error);
                    showMessage("Не удалось добавить продукт.");
                });
        }

        function addRecipe() {
            const recipe = getRecipeFormData();

            sendData(recipeConfig.postUrl, "POST", recipe)
                .then(data => {
                    console.log(data);
                    clearMessage();
                    getRecipes();
                })
                .catch(error => {
                    console.error("Ошибка при добавлении рецепта:", error);
                    showMessage("Не удалось добавить рецепт.");
                });
        }

        function getUpdatedProductData(product) {
            return {
                name: prompt("Введите новое название продукта:", product.name) || product.name,
                translate: prompt("Введите новый перевод продукта:", product.translate) || product.translate,
                alterName: prompt("Введите новую категорию продукта:", product.alterName) || product.alterName
            };
        }

        function getUpdatedRecipeData(recipe) {
            return {
                name: prompt("Введите новое название рецепта:", recipe.name) || recipe.name,
                translate_of_recipe: prompt("Введите новый перевод рецепта:", recipe.translate_of_recipe) || recipe.translate_of_recipe,
                alter_name_of_recipe: prompt("Введите новую категорию рецепта:", recipe.alter_name_of_recipe) || recipe.alter_name_of_recipe,
                recipe: prompt("Введите новый текст рецепта:", recipe.recipe) || recipe.recipe
            };
        }

        function updateItem(config, item) {
            const id = config.getId(item);

            let updatedData;

            if (config.listId === "productList") {
                updatedData = getUpdatedProductData(item);
            }

            if (config.listId === "recipeList") {
                updatedData = getUpdatedRecipeData(item);
            }

            updateData(config.updateUrl, id, updatedData)
                .then(data => {
                    console.log(data);
                    clearMessage();
                    config.refresh();
                })
                .catch(error => {
                    console.error("Ошибка при обновлении:", error);
                    showMessage("Не удалось обновить данные.");
                });
        }

        function deleteItem(config, item) {
            const id = config.getId(item);

            deleteData(config.deleteUrl, id)
                .then(data => {
                    console.log(data);
                    clearMessage();
                    config.refresh();
                })
                .catch(error => {
                    console.error("Ошибка при удалении:", error);
                    showMessage("Не удалось удалить данные.");
                });
        }

        window.onload = function () {
            getProducts();
            getRecipes();
        };
    </script>
</body>
</html>
